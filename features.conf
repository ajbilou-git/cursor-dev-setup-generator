# ============================================
# Optional Features Configuration
# ============================================
# Enable or disable optional features below.
# The setup agent reads this file during Phase 2 and respects these settings.
# Set to "true" to enable, "false" to disable.

# ============================================
# NOTIFICATIONS
# ============================================
# Teams webhook notifications (dev-pipeline sends results to a Teams channel)
# Requires TEAMS_WEBHOOK_URL in variables.env
TEAMS_NOTIFICATIONS=false

# Slack webhook notifications (alternative to Teams)
# Requires SLACK_WEBHOOK_URL in variables.env
SLACK_NOTIFICATIONS=false

# ============================================
# CODE REVIEW
# ============================================
# CodeRabbit automated code review in dev-approval pipeline
# Requires CodeRabbit CLI installed (cr command available)
CODERABBIT_REVIEW=true

# Security review with Trivy SARIF analysis
# Requires Trivy installed or CI/CD integration
TRIVY_SECURITY_SCAN=false

# ============================================
# DOCUMENTATION
# ============================================
# Confluence doc-sync (fetch Confluence pages into .cursor/docs/)
# Requires Confluence MCP configured
CONFLUENCE_DOC_SYNC=false

# Sprint reporter (generate sprint progress reports from Jira)
# Requires Jira MCP configured
SPRINT_REPORTER=false

# ============================================
# INFRASTRUCTURE
# ============================================
# Bootstrap infra alignment (compare infra repo with bootstrap reference)
# Requires bootstrap repo configured (REPO_BOOTSTRAP_NAME)
INFRA_BOOTSTRAP_ALIGNMENT=false

# Bootstrap DevOps expert (tech watch, provider changelogs)
# Requires bootstrap repo configured
BOOTSTRAP_DEVOPS_EXPERT=false

# ============================================
# DEVELOPER EXPERIENCE
# ============================================
# Token optimizer (detect and fix LLM context waste)
TOKEN_OPTIMIZER=true

# GPG signed commits (git commit -S)
# If false, skills will use "git commit -m" instead of "git commit -S -m"
SIGNED_COMMITS=true

# Auto-install missing tools during setup (Phase 3)
# If false, the agent will list missing tools and wait for manual install
AUTO_INSTALL_TOOLS=true
